name: Deploy Lenny Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Clone private data repo
        run: |
          if [ -z "${{ secrets.LENNY_DATA_TOKEN }}" ]; then
            echo "LENNY_DATA_TOKEN is not set."
            echo "Create token with access to private data repo and set repository secret LENNY_DATA_TOKEN."
            exit 1
          fi
          git clone "https://x-access-token:${{ secrets.LENNY_DATA_TOKEN }}@github.com/LennysNewsletter/lennys-newsletterpodcastdata-all.git" lennys-newsletterpodcastdata-all

      - name: Sync data
        run: node scripts/sync-lenny-data.mjs

      - name: Build
        run: |
          export VITE_BASE_PATH="/${{ github.event.repository.name }}/"
          npm run build --prefix web
          cp web/dist/index.html web/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
