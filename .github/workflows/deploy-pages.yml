name: Deploy Lenny Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Verify public data snapshot
        run: |
          if [ ! -f web/public/data/index.json ]; then
            echo "Missing web/public/data/index.json"
            exit 1
          fi
          if [ ! -f web/public/data/search-index.json ]; then
            echo "Missing web/public/data/search-index.json"
            exit 1
          fi

      - name: Build
        run: |
          export VITE_BASE_PATH="/${{ github.event.repository.name }}/"
          export VITE_CONTENT_MODE="public"
          npm run build --prefix web
          cp web/dist/index.html web/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
