<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lenny Data Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>
    (function () {
      var path = window.location.pathname.toLowerCase();
      var bases = [];
      if (path.indexOf('/portal/') !== -1) {
        bases.push('/portal/assets/');
      }
      bases.push('./assets/');
      bases.push('/assets/');
      bases = bases.filter(function (v, i, a) { return a.indexOf(v) === i; });
      window.__ASSET_BASE_CANDIDATES__ = bases;

      function loadCssAt(index) {
        if (index >= bases.length) {
          console.error('Unable to load styles.css from known paths.');
          return;
        }
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = bases[index] + 'styles.css';
        link.onload = function () { window.__ASSET_BASE__ = bases[index]; };
        link.onerror = function () { loadCssAt(index + 1); };
        document.head.appendChild(link);
      }

      loadCssAt(0);
    })();
  </script>
</head>
<body>
  <div class="bg-glow"></div>
  <header class="topbar container">
    <a class="brand" href="./index.html">Lenny Data Portal</a>
    <div class="topbar-actions">
      <a class="pill ghost" href="./docs.html" data-i18n="nav.docs">文档中心</a>
      <select id="lang-switcher" class="lang-switcher" aria-label="Language switcher">
        <option value="zh-CN">简体中文</option>
        <option value="zh-HK">繁體中文</option>
        <option value="en">English</option>
      </select>
    </div>
  </header>

  <main class="container home">
    <section class="hero card reveal">
      <p class="eyebrow" data-i18n="home.eyebrow">Lenny 私有知识库总览</p>
      <h1 data-i18n="home.title">把所有内容变成可检索、可跳转、可阅读的 Docs 体验</h1>
      <p class="hero-sub" data-i18n="home.subtitle">
        首页聚合核心指标与最新内容，文档页支持筛选、搜索、标签导航和原文阅读。
      </p>
      <div class="hero-actions">
        <a class="pill primary" href="./docs.html" data-i18n="home.openDocs">打开文档中心</a>
        <a class="pill ghost" href="./docs.html?type=podcast" data-i18n="home.openPodcasts">只看播客</a>
        <a class="pill ghost" href="./docs.html?type=newsletter" data-i18n="home.openNewsletters">只看 Newsletter</a>
      </div>
    </section>

    <section class="stats-grid reveal">
      <article class="metric card">
        <p class="metric-label" data-i18n="stats.totalDocs">文档总数</p>
        <p class="metric-value" id="metric-total-docs">-</p>
      </article>
      <article class="metric card">
        <p class="metric-label" data-i18n="stats.podcastCount">播客文档</p>
        <p class="metric-value" id="metric-podcast-count">-</p>
      </article>
      <article class="metric card">
        <p class="metric-label" data-i18n="stats.newsletterCount">Newsletter 文档</p>
        <p class="metric-value" id="metric-newsletter-count">-</p>
      </article>
      <article class="metric card">
        <p class="metric-label" data-i18n="stats.totalWords">总词数</p>
        <p class="metric-value" id="metric-total-words">-</p>
      </article>
    </section>

    <section class="dual-grid reveal">
      <article class="card panel">
        <div class="panel-head">
          <h2 data-i18n="home.latestPodcasts">最新播客</h2>
          <a class="text-link" href="./docs.html?type=podcast" data-i18n="home.viewAll">查看全部</a>
        </div>
        <ul id="latest-podcasts" class="doc-list compact"></ul>
      </article>

      <article class="card panel">
        <div class="panel-head">
          <h2 data-i18n="home.latestNewsletters">最新 Newsletter</h2>
          <a class="text-link" href="./docs.html?type=newsletter" data-i18n="home.viewAll">查看全部</a>
        </div>
        <ul id="latest-newsletters" class="doc-list compact"></ul>
      </article>
    </section>

    <section class="card panel reveal">
      <div class="panel-head">
        <h2 data-i18n="home.topTags">热门标签</h2>
        <a class="text-link" href="./docs.html" data-i18n="home.exploreInDocs">去文档页探索</a>
      </div>
      <div id="tag-cloud" class="tag-cloud"></div>
    </section>

    <section class="card panel reveal">
      <div class="panel-head">
        <h2 data-i18n="home.quickSearch">快速检索入口</h2>
      </div>
      <form id="home-search-form" class="quick-search">
        <input id="home-query" type="search" autocomplete="off" data-i18n-placeholder="home.searchPlaceholder" placeholder="输入关键词，例如 AI、growth、leadership">
        <button class="pill primary" type="submit" data-i18n="home.searchDocs">搜索文档</button>
      </form>
    </section>
  </main>

  <script>
    (function () {
      var bases = window.__ASSET_BASE_CANDIDATES__ || ['./assets/', '/portal/assets/', '/assets/'];

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          var script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      function tryBase(index) {
        if (index >= bases.length) {
          console.error('Unable to load app scripts from known paths.');
          return;
        }
        loadScript(bases[index] + 'app.js')
          .then(function () { return loadScript(bases[index] + 'index-page.js'); })
          .catch(function () { tryBase(index + 1); });
      }

      tryBase(0);
    })();
  </script>
</body>
</html>
